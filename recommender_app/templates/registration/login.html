{% extends 'recommender_app/base.html' %}

{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-lg p-4">
        <h2 class="text-center text-primary mb-4">Prijava u MovieRec</h2>
        
        {% if form.errors %}
            <div class="alert alert-danger text-center">
                Neispravno korisničko ime ili lozinka. Pokušajte ponovno.
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group mb-3">
                <label for="id_username" class="form-label">Korisničko ime:</label>
                <input type="text" name="username" id_username class="form-control" placeholder="Unesite korisničko ime" required>
            </div>
            <div class="form-group mb-4">
                <label for="id_password" class="form-label">Lozinka:</label>
                <input type="password" name="password" id_password class="form-control" placeholder="Unesite lozinku" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Prijavi se</button>
        </form>
        
        <div class="text-center mt-3">
            <small class="text-muted">Novi korisnici se mogu registrirati kroz Admin panel ili kreirati profil.</small>
        </div>
    </div>
</div>
{% endblock %}
